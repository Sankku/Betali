name: Auto Documentation Update

on:
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0'  # Cada domingo

jobs:
  update-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install MCP Server
        run: |
          npm install -g ./project-docs-mcp
          
      - name: Run Claude Code with MCP
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude-code --mcp project-docs-mcp \
            --prompt "Analiza el proyecto y actualiza toda la documentación" \
            --output ./docs/
            
      - name: Commit updated docs
        run: |
          git config --local user.email "bot@proyecto.com"
          git config --local user.name "Docs Bot"
          git add docs/
          git commit -m "🤖 Auto-update documentation" || exit 0
          git push